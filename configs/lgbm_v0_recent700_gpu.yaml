# Legacy alias for the default GPU recent700 baseline.
# `configs/lgbm_v0_recent700.yaml` is now also GPU/OpenCL by default.

train_path: data/raw/train.parquet
output_dir: outputs
model_dir: models

start_date_id: 700
end_date_id: null

valid_days: 200
gap_days: 0

random_state: 42
n_estimators: 3000
learning_rate: 0.03
num_leaves: 64
subsample: 0.8
colsample_bytree: 0.8
early_stopping_rounds: 100

device_type: gpu
max_bin: 255
gpu_use_dp: false
