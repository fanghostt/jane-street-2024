# LightGBM V0 — first *formal* baseline (recent data, date_id >= 700).
# Still a raw-feature baseline: feature_00..feature_78 + symbol_id + time_id.
# No feature engineering, no repo-parity features, no GRU/online/ensemble.
# start_date_id=700 aligns the training start with evgeniavolkova/kagglejanestreet
# for later parity comparisons.
# Paths are resolved relative to the project root.

train_path: data/raw/train.parquet
output_dir: outputs
model_dir: models

# Train on date_id >= 700 (no upper bound).
start_date_id: 700
end_date_id: null

# Holdout split: last `valid_days` distinct date_ids are validation.
valid_days: 200
gap_days: 0

# Model hyperparameters.
random_state: 42
n_estimators: 3000
learning_rate: 0.03
num_leaves: 64
subsample: 0.8
colsample_bytree: 0.8
early_stopping_rounds: 100
