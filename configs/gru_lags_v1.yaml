# GRU (day-batch) + train-reconstructed responder lags.
# Same protocol/hyperparameters as gru_v0.yaml; the only difference is the 9
# responder_i_lag_1 features (previous day's responders, reconstructed from
# train.parquet). Only the `full` walk-forward variant runs here to keep the
# A/B fast (fit once, evaluate the test block — no per-day retraining).
model: gru
variants: [full]

train_path: data/raw/train.parquet

start_date_id: 700
end_date_id: null

test_days: 200
valid_days: 200
gap_days: 0
update_cadence: 1

random_state: 42
device: auto
include_time: true
use_responder_lags: true

# Experiment tracking (offline-safe: writes to wandb/, sync later with `wandb sync`).
use_wandb: true
wandb_project: js2024-lags

# bf16 autocast (+TF32) on CUDA: ~1.5x faster day-batch fit on the 5090.
# Off here so the lag A/B stays fp32-comparable to the gru_v0 baselines.
use_amp: false

hidden_sizes: [500]
dropout_rates: [0.3]
hidden_sizes_linear: [500, 300]
dropout_rates_linear: [0.2, 0.1]
lr: 0.0005
lr_refit: 0.0003
epochs: 1000
early_stopping_patience: 1
weight_decay: 0.01
grad_clip: 1.0
