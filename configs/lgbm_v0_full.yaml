# LightGBM V0 — full-data baseline (all date_ids).
# Same raw-feature setup as recent700, but trains on the entire history.
# Heavier to run; prefer recent700 first. This file may be committed and run
# later. No feature engineering, no repo-parity features, no GRU/online/ensemble.
# Paths are resolved relative to the project root.

train_path: data/raw/train.parquet
output_dir: outputs
model_dir: models

# No date bounds: use all available history.
start_date_id: null
end_date_id: null

# Holdout split: last `valid_days` distinct date_ids are validation.
valid_days: 200
gap_days: 0

# Model hyperparameters.
random_state: 42
n_estimators: 3000
learning_rate: 0.03
num_leaves: 64
subsample: 0.8
colsample_bytree: 0.8
early_stopping_rounds: 100
