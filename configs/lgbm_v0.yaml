# LightGBM V0 baseline configuration.
# Paths are resolved relative to the project root.

train_path: data/raw/train.parquet
output_dir: outputs
model_dir: models

# Optional inclusive date_id bounds applied at load time (null = no bound).
start_date_id: null
end_date_id: null

# Holdout split: last `valid_days` distinct date_ids are validation,
# with `gap_days` dropped between train and valid.
valid_days: 200
gap_days: 0

# Model hyperparameters. GPU/OpenCL is the default backend for full LGBM runs on
# this workstation; max_bin=255 matched/exceeded the CPU baseline in recent700 tests.
random_state: 42
n_estimators: 3000
learning_rate: 0.03
num_leaves: 64
subsample: 0.8
colsample_bytree: 0.8
early_stopping_rounds: 100
device_type: gpu
max_bin: 255
gpu_use_dp: false
