# TEMPLATE — GRU (day-batch) config-driven walk-forward (js2024-run-experiment).
#
# Reference/documentation only. Copy into `configs/` and trim to the keys you
# actually vary before running; the runner is pointed at the copy, not at this file.
#
# Day-batch GRU + auxiliary responder heads + online refit LR — closer to
# evgeniavolkova/kagglejanestreet. Feature engineering (market averages / rolling
# stats) is left for a later version. Its `incremental` variant is a single online
# refit (no second-level `update_methods` taxonomy).

model: gru
variants: [full, incremental]   # walk-forward variants (model-agnostic)

train_path: data/raw/train.parquet

# Date range. start_date_id=700 matches the parity baseline; null = no bound.
start_date_id: 700
end_date_id: null

# Fixed trailing TEST block + train-tail early-stopping holdout.
test_days: 200
valid_days: 200
gap_days: 0
# Online refit cadence (days between updates).
update_cadence: 1

random_state: 42
device: auto          # "auto" uses CUDA when available, else CPU; or "cpu"/"cuda".
include_time: true    # add `time_id` as a model input.

# Sequence backbone. The day-batch + auxiliary-head protocol below is shared; only
# the per-step backbone changes. `model: gru` honours `model_type` (gru|lstm);
# the transformer/tcn backbones are selected via their own specs instead — see
# configs/transformer_v0.yaml (causal attention, `num_heads`) and
# configs/tcn_v0.yaml (causal dilated conv, `kernel_size`).
model_type: gru       # gru | lstm (within the `gru` spec).
# num_heads: 5        # transformer only; each hidden_size must divide evenly.
# kernel_size: 3      # tcn only; causal conv kernel width.

# GRU + linear-head sizes. dropout_rates length must match hidden_sizes, and
# dropout_rates_linear must match hidden_sizes_linear.
hidden_sizes: [500]
dropout_rates: [0.3]
hidden_sizes_linear: [500, 300]
dropout_rates_linear: [0.2, 0.1]

lr: 0.0005            # offline training LR.
lr_refit: 0.0003      # online refit LR (per update).
epochs: 1000
early_stopping_patience: 1
weight_decay: 0.01
grad_clip: 1.0
