# LightGBM lags V1 — V0 recent700 baseline + train-reconstructed responder lags.
# Feature set: feature_00..feature_78 + symbol_id + time_id + responder_0_lag_1
# ..responder_8_lag_1 (the previous day's responders, reconstructed from
# train.parquet; see js2024.modeling.lag_features). The synthetic lags.parquet
# is never read.
# Identical data window and hyperparameters to lgbm_v0_recent700.yaml so the
# only difference vs that baseline is the lag features (clean A/B).
# Paths are resolved relative to the project root.
#
# Drives both CLIs: `js2024-train-lgbm` (single holdout via valid_days/gap_days)
# and `js2024-run-experiment` (walk-forward full/incremental via the model/
# variants/test_days/update_* keys below). The latter now consumes the same
# reconstructed responder lags (see js2024.modeling.registry._load_lgbm_frame).

# Config-driven walk-forward (js2024-run-experiment); ignored by js2024-train-lgbm.
model: lgbm
variants: [full, incremental]

train_path: data/raw/train.parquet
output_dir: outputs
model_dir: models

# Train on date_id >= 700 (no upper bound).
start_date_id: 700
end_date_id: null

# Fixed trailing TEST block scored by run-experiment (every variant shares it).
test_days: 200

# Early-stopping holdout from the TRAIN tail (also the train-lgbm holdout).
valid_days: 200
gap_days: 0

# Online taxonomy: the `incremental` variant expands into one named run per
# method (lgbm_refit / lgbm_continue / lgbm_retrain). train-lgbm ignores these.
update_methods: [refit, continue, retrain]
update_cadence: 1
refit_decay: 0.9
continue_rounds: 10

# Add reconstructed responder_i_lag_1 features to the model inputs.
use_responder_lags: true

# Model hyperparameters (identical to lgbm_v0_recent700.yaml).
random_state: 42
n_estimators: 3000
learning_rate: 0.03
num_leaves: 64
subsample: 0.8
colsample_bytree: 0.8
early_stopping_rounds: 100
device_type: gpu
max_bin: 255
gpu_use_dp: false
